<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lazada Promo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#F57224,#ffb347);
}

/* LINK STYLE LAZADA */
a{
    color:#F57224;
}

.container{
    width:380px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:35px 30px;
    text-align:center;
    color:#fff;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* LOGO */
.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    font-size:24px;
    margin-bottom:10px;
}

.desc{
    font-size:14px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    text-align:center;
    font-size:16px;
    font-weight:600;
    outline:none;
}

button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#F57224;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    background:#e85d10;
}

.result{
    display:none;
    margin-top:20px;
}

.warning{
    display:none;
    margin-top:15px;
    padding:12px;
    background:rgba(255,0,0,0.25);
    border-radius:10px;
    font-size:14px;
}

.claim-btn{
    margin-top:15px;
    display:none;
}

.claim-btn button{
    background:#00ff95;
    color:#111;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO LAZADA -->
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Lazada-logo-rounded-lazada-logo-free-png.webp" alt="Lazada Logo">

    <h1>Lazada Promo</h1>
    <p class="desc">Masukkan kode promo untuk mendapatkan saldo hingga Rp500.000</p>

    <input type="text" id="promoCode" placeholder="Masukkan kode promo">

    <button onclick="checkVoucher()">Cek Voucher</button>

    <div class="warning" id="warning">
        Kode voucher salah. Silakan coba lagi.
    </div>

    <div class="result" id="result">
        <h2 id="saldoText"></h2>
        <p>Selamat! Anda mendapatkan hadiah promo.</p>

        <div class="claim-btn" id="claimBtn">
            <a href="https://pagcoroke.com" target="_blank">
                <button>CLAIM SEKARANG</button>
            </a>
        </div>
    </div>

</div>

<script>

const VALID_CODE = "PROMOLIBURAN2026";

function checkVoucher(){

    const input = document.getElementById("promoCode").value.trim();
    const result = document.getElementById("result");
    const warning = document.getElementById("warning");
    const saldoText = document.getElementById("saldoText");
    const claimBtn = document.getElementById("claimBtn");

    if(input === VALID_CODE){

        const hadiah = 500000;

        saldoText.innerHTML = "🎉 Rp " + hadiah.toLocaleString("id-ID");

        result.style.display = "block";
        warning.style.display = "none";
        claimBtn.style.display = "block";

    } else {
        warning.style.display = "block";
        result.style.display = "none";
    }
}

</script>

</body>
</html>
